# ==========================================================================
# CRE WORKFLOW SETTINGS FILE — Midas PoR Attestation
# ==========================================================================
# One workflow instance handles ALL registered tokens.
# To add a new token: update the config JSON (tokens map) and run:
#   cre workflow update-config --target por-attester-dev
# No workflow redeployment needed.

# ==========================================================================
por-attester-dev:
  user-workflow:
    workflow-name: "midas_por_attestation_dev"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.por_attestation.dev.json"
    secrets-path: "../secrets.yaml"

# ==========================================================================
por-attester-prod:
  user-workflow:
    workflow-name: "midas_por_attestation_prod"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.por_attestation.prod.json"
    secrets-path: "../secrets.yaml"
